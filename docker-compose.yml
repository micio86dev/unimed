name: unimed

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: unimed
      POSTGRES_USER: unimed
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unimed -d unimed"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ./apps/backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/backend:/var/www/html
    depends_on:
      - php

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000/api
      NUXT_HOST: 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - nginx

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

volumes:
  pgdata:
  frontend_node_modules:
