name: Deploy

# Backend deploys to Railway on pushes to main once CI succeeds. The job
# no-ops gracefully when RAILWAY_TOKEN is not configured, so forks won't fail.
#
# The frontend deploys via Vercel's native Git integration (project linked to
# this repo, Root Directory = apps/frontend), so it is not handled here.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy backend → Railway
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set — skipping backend deploy."
            exit 0
          fi
          npm i -g @railway/cli
          # Monorepo: deploy only apps/backend as the build root so Nixpacks
          # detects the Laravel app (not the repo-root pnpm workspace).
          railway up apps/backend --path-as-root --service backend --detach
