name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  PHP_VERSION: "8.4"

jobs:
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend · lint · typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint (Biome)
        run: pnpm exec biome check .
        working-directory: .

      - name: Type-check
        run: pnpm typecheck

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Build
        run: pnpm build

  # ---------------------------------------------------------------------------
  backend:
    name: Backend · tests · coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, pgsql, intl, gd, zip, bcmath, mbstring
          coverage: pcov

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: apps/backend/vendor
          key: composer-${{ hashFiles('apps/backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Pest with coverage
        run: ./vendor/bin/pest --coverage --min=70

  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: unimed
          POSTGRES_USER: unimed
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U unimed" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: unimed
      DB_USERNAME: unimed
      DB_PASSWORD: secret
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, pgsql, intl, gd, zip, bcmath, mbstring

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install backend dependencies
        working-directory: apps/backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare backend
        working-directory: apps/backend
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force --seed
          php artisan serve --port=8000 &
          sleep 3

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: apps/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        working-directory: apps/frontend
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8000/api
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/frontend/playwright-report
          retention-days: 7
